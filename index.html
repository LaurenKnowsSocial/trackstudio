<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Receipts</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300;1,9..144,400&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FBF8F3; --ink:#292420; --ink2:#5C544A; --muted:#8A8071;
  --line:#E4DCCF; --line2:#CFC4B0; --card:#FFFDF8;
  --accent:#D96F00; --accent-bright:#EB8201; --cream:#FFF4D6;
  --good:#2A7A3B; --good-dim:rgba(42,122,59,.09);
  --bad:#BA3A2A; --bad-dim:rgba(186,58,42,.08);
  --warn:#8a6d00;
  --instagram:#e1306c; --tiktok:#0f7e86;
  --p1:#3E6FAE; --p2:#557A29; --p3:#9A5BA6; --p4:#B7860B;
  --serif:'Fraunces',Georgia,serif;
  --mono:'DM Mono',ui-monospace,'SF Mono',Menlo,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:var(--mono);font-size:13px;line-height:1.55;}
button{font-family:var(--mono);}
a{color:inherit;}

/* ── auth ─────────────────────────────────── */
#authScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.auth-box{width:360px;border:1px solid var(--ink);border-top-width:3px;background:var(--card);padding:38px 34px;}
.auth-logo{font-family:var(--serif);font-weight:300;font-size:34px;}
.auth-logo em{font-style:italic;color:var(--accent);}
.auth-tagline{font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:var(--muted);margin:6px 0 30px;}
.auth-label{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.auth-input{width:100%;font-family:var(--mono);font-size:13px;padding:10px 12px;border:1px solid var(--line2);background:var(--paper);color:var(--ink);outline:none;}
.auth-input:focus{border-color:var(--accent);}
.auth-btn{width:100%;margin-top:12px;padding:11px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;background:var(--ink);color:var(--paper);border:none;cursor:pointer;}
.auth-btn:hover{background:var(--accent);}
.auth-error{display:none;color:var(--bad);font-size:11px;margin-top:12px;}
.auth-note{font-size:9px;color:var(--muted);margin-top:22px;line-height:1.7;}

/* ── shell ────────────────────────────────── */
#appShell{display:none;}
#appShell.visible{display:block;}
.topbar{display:flex;align-items:center;gap:18px;padding:14px 24px;border-bottom:1px solid var(--line);flex-wrap:wrap;}
.topbar-logo{font-family:var(--serif);font-weight:300;font-size:20px;white-space:nowrap;}
.topbar-logo em{font-style:italic;color:var(--accent);}
.client-pill{font-size:10px;letter-spacing:.1em;text-transform:uppercase;background:transparent;border:1px solid var(--line2);color:var(--ink2);padding:5px 14px;cursor:pointer;}
.client-pill.active{background:var(--ink);border-color:var(--ink);color:var(--paper);}
.client-pill:focus-visible,.nav-btn:focus-visible,.ctl-btn:focus-visible{outline:2px solid var(--accent);outline-offset:1px;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.sync-dot-wrap{display:flex;align-items:center;gap:5px;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-right:8px;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--good);}
.client-badge{display:flex;align-items:center;gap:6px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink2);margin-right:8px;}
.client-badge-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);}
.nav-btn{padding:6px 14px;font-size:10px;letter-spacing:.12em;text-transform:uppercase;border:1px solid var(--line2);background:transparent;color:var(--ink2);cursor:pointer;}
.nav-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.main{max-width:1040px;margin:0 auto;padding:34px 20px 90px;}

/* ── statement controls ───────────────────── */
.controls{display:flex;flex-wrap:wrap;gap:16px;align-items:center;margin-bottom:26px;font-size:10px;}
.ctl-group{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.ctl-label{letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-right:4px;}
.ctl-btn{font-size:10px;letter-spacing:.08em;text-transform:uppercase;background:transparent;border:1px solid var(--line2);color:var(--ink2);padding:5px 12px;cursor:pointer;}
.ctl-btn:hover{border-color:var(--ink2);}
.ctl-btn.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.date-input{font-family:var(--mono);font-size:10px;border:1px solid var(--line2);background:var(--card);color:var(--ink);padding:4px 7px;outline:none;}
.date-input:focus{border-color:var(--accent);}

/* ── masthead / stamp ─────────────────────── */
.masthead{border-top:3px solid var(--ink);border-bottom:1px solid var(--ink);padding:22px 0 20px;display:flex;justify-content:space-between;align-items:flex-end;gap:20px;flex-wrap:wrap;}
.wordmark{font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--ink2);margin-bottom:10px;}
.wordmark em{color:var(--accent);font-style:normal;}
h1{font-family:var(--serif);font-weight:300;font-style:italic;font-size:52px;line-height:.95;margin:0;letter-spacing:-1px;text-wrap:balance;}
.mast-meta{font-size:11px;color:var(--muted);margin-top:12px;}
.mast-meta b{color:var(--ink2);font-weight:500;}
.stamp{font-size:12px;letter-spacing:.18em;text-transform:uppercase;border:2px solid var(--accent);color:var(--accent);padding:10px 16px;transform:rotate(-3deg);font-weight:500;white-space:nowrap;}
.stamp.good{border-color:var(--good);color:var(--good);}
.stamp.bad{border-color:var(--bad);color:var(--bad);}
.stamp small{display:block;font-size:9px;letter-spacing:.1em;font-weight:400;margin-top:2px;}

/* ── tiles ────────────────────────────────── */
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:1px;background:var(--line);border:1px solid var(--line);margin:32px 0;}
.tile{background:var(--card);padding:20px 18px 16px;}
.tile-label{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.tile-val{font-family:var(--serif);font-weight:600;font-size:40px;line-height:1;font-variant-numeric:tabular-nums;}
.tile-val.up{color:var(--good)} .tile-val.down{color:var(--bad)} .tile-val.accent{color:var(--accent)}
.tile-sub{font-size:10px;color:var(--muted);margin-top:8px;}
.tile-sub b{color:var(--good);font-weight:500;} .tile-sub b.neg{color:var(--bad);}

/* ── sections ─────────────────────────────── */
.sec{margin:44px 0;}
.sec-hd{display:flex;align-items:baseline;gap:14px;border-bottom:1px solid var(--ink);padding-bottom:8px;margin-bottom:18px;}
.sec-no{font-size:10px;color:var(--accent);letter-spacing:.1em;}
.sec-title{font-family:var(--serif);font-style:italic;font-size:21px;}
.sec-why{margin-left:auto;font-size:10px;color:var(--muted);text-align:right;}

/* ── matrix ───────────────────────────────── */
.matrix{display:grid;grid-template-columns:170px repeat(3,1fr);gap:1px;background:var(--line);border:1px solid var(--line);overflow-x:auto;}
.mx{background:var(--card);padding:14px;min-width:0;}
.mx-hdr{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;background:var(--paper);}
.mx-pillar{display:flex;align-items:center;gap:8px;font-size:12px;background:var(--paper);}
.pdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.pdot.ig{background:var(--instagram);} .pdot.tt{background:var(--tiktok);} .pdot.fb{background:#1877F2;}
.mx-val{font-family:var(--serif);font-weight:600;font-size:23px;font-variant-numeric:tabular-nums;line-height:1;}
.mx-sub{font-size:9px;color:var(--muted);margin-top:5px;}
.mx-win{color:var(--good);font-weight:500;}
.mx-empty{color:var(--line2);display:flex;align-items:center;font-size:14px;}

/* ── timeline ─────────────────────────────── */
.chart-wrap{border:1px solid var(--line);background:var(--card);padding:18px 10px 8px;overflow-x:auto;}
svg{display:block;width:100%;height:auto;}
.dot{transition:r .12s ease;cursor:pointer;}
.dot:hover{r:9;}
@media (prefers-reduced-motion: reduce){.dot{transition:none}}
.legend{display:flex;gap:18px;flex-wrap:wrap;margin-top:12px;font-size:10px;color:var(--ink2);}
.legend span{display:flex;align-items:center;gap:6px;}

/* ── ledger ───────────────────────────────── */
.ledger{overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:780px;}
th{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);text-align:left;font-weight:500;padding:6px 10px;border-bottom:1px solid var(--ink);}
th.num,td.num{text-align:right;font-variant-numeric:tabular-nums;}
td{padding:12px 10px;border-bottom:1px dashed var(--line2);font-size:12px;vertical-align:baseline;}
tr.rowlink{cursor:pointer;}
tr.rowlink:hover td{background:var(--cream);}
td.title{font-family:var(--serif);font-size:15px;}
.plat-mini{font-size:9px;letter-spacing:.08em;color:var(--muted);}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:10px;color:var(--ink2);white-space:nowrap;}
.tag{font-size:9px;letter-spacing:.12em;text-transform:uppercase;font-weight:500;padding:3px 8px;white-space:nowrap;}
.tag.win{color:var(--good);background:var(--good-dim);}
.tag.learn{color:var(--ink2);background:var(--cream);}
.tag.under{color:var(--bad);background:var(--bad-dim);}
.tag.pending{color:var(--muted);border:1px dashed var(--line2);}
.action{font-size:10px;color:var(--muted);}
.action.repeat{color:var(--good);font-weight:500;}
.action.drop{color:var(--bad);font-weight:500;}
.empty-period{padding:30px;text-align:center;color:var(--muted);font-size:11px;border:1px dashed var(--line2);}

/* ── total / share links ──────────────────── */
.total{margin-top:40px;border-top:1px solid var(--ink);padding:20px 4px 34px;position:relative;}
.total-row{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:10px;}
.total-label{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);}
.total-vals{font-family:var(--serif);font-weight:600;font-size:26px;font-variant-numeric:tabular-nums;}
.total-vals small{font-family:var(--mono);font-size:10px;color:var(--muted);font-weight:400;margin:0 8px 0 4px;}
.fineprint{font-size:9px;color:var(--muted);margin-top:14px;line-height:1.7;}
.tear{position:absolute;left:0;right:0;bottom:-2px;height:12px;
  background:linear-gradient(-45deg,transparent 8px,var(--paper) 0) 0 0/16px 16px repeat-x,
             linear-gradient(45deg,transparent 8px,var(--paper) 0) 8px 0/16px 16px repeat-x;
  filter:drop-shadow(0 1px 0 var(--line2));}
.share-links{margin-top:34px;}
.share-title{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.url-item{display:flex;justify-content:space-between;align-items:center;gap:10px;border:1px solid var(--line);background:var(--card);padding:9px 12px;margin-bottom:6px;font-size:10px;}
.url-str{color:var(--muted);word-break:break-all;}
.url-cname{color:var(--ink2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px;}
.url-copy{font-size:9px;letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--line2);background:transparent;color:var(--ink2);padding:4px 10px;cursor:pointer;white-space:nowrap;}
.url-copy:hover{border-color:var(--accent);color:var(--accent);}

/* ── posts view ───────────────────────────── */
.posts-layout{display:grid;grid-template-columns:280px 1fr;gap:28px;align-items:start;}
@media (max-width:820px){.posts-layout{grid-template-columns:1fr;}}
.plist-box{border:1px solid var(--line);background:var(--card);max-height:76vh;overflow-y:auto;}
.pf-row{display:flex;gap:4px;padding:10px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--card);}
.prow{padding:10px 12px;border-bottom:1px dashed var(--line2);cursor:pointer;}
.prow:hover{background:var(--cream);}
.prow.active{background:var(--cream);border-left:3px solid var(--accent);padding-left:9px;}
.prow-top{display:flex;justify-content:space-between;gap:8px;align-items:baseline;}
.prow-title{font-family:var(--serif);font-size:13px;line-height:1.3;}
.mini-pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.prow-meta{display:flex;justify-content:space-between;align-items:center;margin-top:5px;}
.prow-date{font-size:9px;color:var(--muted);}
.cdots{display:flex;gap:3px;}
.cdot{font-size:8px;color:var(--muted);border:1px solid var(--line2);padding:1px 5px;}
.cdot.done{background:var(--good-dim);color:var(--good);border-color:transparent;}
.cdot.due{background:var(--cream);color:var(--warn);border-color:var(--warn);}
.post-hdr{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:14px;}
.post-hl{font-family:var(--serif);font-style:italic;font-weight:300;font-size:26px;line-height:1.15;letter-spacing:-.3px;}
.post-link-out{font-size:10px;color:var(--muted);text-decoration:none;border:1px solid var(--line);padding:2px 8px;margin-left:10px;vertical-align:middle;white-space:nowrap;}
.post-link-out:hover{color:var(--accent);border-color:var(--accent);}
.meta-row{display:flex;gap:14px;flex-wrap:wrap;margin-top:8px;}
.meta-chip{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--ink2);}
.otag{font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:500;border:2px solid var(--line2);color:var(--muted);padding:8px 12px;transform:rotate(-2deg);}
.otag.winner{border-color:var(--good);color:var(--good);}
.otag.underperformed{border-color:var(--bad);color:var(--bad);}
.otag.learning{border-color:var(--warn);color:var(--warn);}
.ctabs{display:flex;gap:5px;margin:16px 0;}
.ctab{font-size:10px;letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--line2);background:transparent;color:var(--ink2);padding:6px 14px;cursor:pointer;}
.ctab.active{background:var(--ink);border-color:var(--ink);color:var(--paper);}
.ctab.locked{opacity:.4;cursor:default;}
.ctab.due{border-color:var(--warn);color:var(--warn);}
.mgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1px;background:var(--line);border:1px solid var(--line);margin-bottom:20px;}
.mc{background:var(--card);padding:14px;}
.mc-lbl{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.mc-val{font-family:var(--serif);font-weight:600;font-size:24px;line-height:1;font-variant-numeric:tabular-nums;}
.mc-val.g{color:var(--good);} .mc-val.r{color:var(--bad);} .mc-val.o{color:var(--accent);} .mc-val.n{color:var(--ink);}
.mc-sub{font-size:9px;color:var(--muted);margin-top:5px;}
.shd{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--line);padding-bottom:6px;margin:22px 0 12px;}
.tgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1px;background:var(--line);border:1px solid var(--line);margin-bottom:8px;}
.tc{background:var(--card);padding:14px;}
.tc-cat{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.tc-val{font-family:var(--serif);font-size:16px;font-weight:600;}
.tc-val.g{color:var(--good);} .tc-val.r{color:var(--bad);} .tc-val.o{color:var(--accent);}
.tc-desc{font-size:9px;color:var(--muted);margin-top:4px;}
.rgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:8px;}
.rc{border:1px solid var(--line);background:var(--card);padding:12px;}
.rc-top{display:flex;justify-content:space-between;margin-bottom:8px;font-size:11px;}
.rc-name{color:var(--ink2);}
.rc-val.g{color:var(--good);} .rc-val.r{color:var(--bad);} .rc-val.o{color:var(--accent);}
.bt{height:4px;background:var(--line);overflow:hidden;}
.bf{height:100%;}
.bf.g{background:var(--good);} .bf.r{background:var(--bad);} .bf.o{background:var(--accent);}
.agrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;}
.ac{border:1px solid var(--line);background:var(--card);padding:14px;}
.ac.sel-repeat{border-color:var(--good);} .ac.sel-iterate{border-color:var(--warn);} .ac.sel-drop{border-color:var(--bad);}
.ac-title{font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:500;margin-bottom:10px;}
.ac-title.g{color:var(--good);} .ac-title.o{color:var(--warn);} .ac-title.r{color:var(--bad);}
.cl{display:flex;flex-direction:column;gap:5px;font-size:10px;}
.cm{color:var(--ink2);} .cu{color:var(--line2);}
.nb{border:1px solid var(--line);border-left:3px solid var(--accent);background:var(--card);padding:12px 14px;margin-bottom:10px;}
.nb-lbl{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:6px;}
.nb-text{font-size:12px;line-height:1.7;color:var(--ink2);}
.empty-state{padding:60px 20px;text-align:center;color:var(--muted);}
.empty-state .ei{font-size:28px;margin-bottom:10px;}
.empty-state .et{font-family:var(--serif);font-style:italic;font-size:18px;color:var(--ink2);}
.empty-state .es{font-size:10px;margin-top:8px;}

/* ── upcoming ─────────────────────────────── */
.dr{display:flex;justify-content:space-between;align-items:center;gap:14px;border:1px solid var(--line);background:var(--card);padding:14px 16px;margin-bottom:8px;cursor:pointer;}
.dr:hover{background:var(--cream);}
.dr-title{font-family:var(--serif);font-size:15px;}
.dr-meta{font-size:9px;color:var(--muted);margin-top:3px;}
.dr-right{text-align:right;}
.dw{font-size:10px;letter-spacing:.1em;text-transform:uppercase;}
.dw.today{color:var(--bad);font-weight:500;}
.dw.soon{color:var(--muted);}
.dc{font-size:9px;color:var(--muted);margin-top:2px;}
</style>
</head>
<body>

<!-- AUTH -->
<div id="authScreen">
  <div class="auth-box">
    <div class="auth-logo">the <em>receipts</em></div>
    <div class="auth-tagline">Weekly statement · social analytics</div>
    <div class="auth-label">Access key</div>
    <input class="auth-input" id="keyInput" type="password" placeholder="Enter your access key…" onkeydown="if(event.key==='Enter')login()"/>
    <button class="auth-btn" onclick="login()">Enter →</button>
    <div class="auth-error" id="authError">Invalid key. Please use the link provided to you.</div>
    <div class="auth-note">Each access key shows only your account's data.<br>Your key was provided by your analytics manager.</div>
  </div>
</div>

<!-- APP -->
<div id="appShell">
  <div class="topbar">
    <div class="topbar-logo">the <em>receipts</em></div>
    <div id="clientTabs" style="display:flex;gap:5px;"></div>
    <div class="topbar-right">
      <div class="sync-dot-wrap"><div class="sync-dot"></div><span>synced</span></div>
      <div id="clientBadge" class="client-badge" style="display:none"><div class="client-badge-dot"></div><span id="clientBadgeLabel"></span></div>
      <button class="nav-btn" id="btnStatement" onclick="setView('statement')">Statement</button>
      <button class="nav-btn" id="btnPosts" onclick="setView('posts')">Posts</button>
      <button class="nav-btn" id="btnUpcoming" onclick="setView('upcoming')">Upcoming</button>
    </div>
  </div>
  <div class="main" id="mainContent"></div>
</div>

<script>
// ══════════════════════════════════════════════════════
// ACCESS KEYS
// 'key-string': 'CLIENT' or 'ADMIN'
// Change these before deploying. Keep them secret.
// ══════════════════════════════════════════════════════
const ACCESS_KEYS = {
  'lks-admin-2026':   'ADMIN',
  'cea-view-2026':    'CEA',
  'btc-view-2026':    'BTC'
};

// Generated by sheet_to_dashboard.py from ~/.claude/social-clients.json —
// names, per-platform baselines, and pillar maps. Edit the json, not this.
const CLIENTS = {
  CEA: { name:'CEA', baselines:{ ig:1200, tt:264 }, pillars:{ P1:'Tips/Demystify', P2:'Proof', P3:'Authority', P4:'AI' } },
  BTC: { name:'Brooklyn Teacup', baselines:{ ig:7241, fb:4329 }, pillars:{ P1:'↔ Process', P2:'🍽️ Use', P3:'🛟 Preservation', P4:'🧠 Education' } }
};

// ══════════════════════════════════════════════════════
// POSTS — Claude's /update-dashboard rewrites this block
// ══════════════════════════════════════════════════════
// DATA_START
const POSTS = [
  {
    id: 1,
    client: 'CEA',

function init(){
  const k = new URLSearchParams(window.location.search).get('key');
  if (k && ACCESS_KEYS[k]) startSession(ACCESS_KEYS[k]);
}
function login(){
  const k = document.getElementById('keyInput').value.trim();
  if (ACCESS_KEYS[k]) startSession(ACCESS_KEYS[k]);
  else { document.getElementById('authError').style.display='block';
         document.getElementById('keyInput').style.borderColor='var(--bad)'; }
}
function startSession(role){
  S.role = role;
  const isAdmin = role==='ADMIN';
  const clients = isAdmin ? Object.keys(CLIENTS) : [role];
  S.activeClient = clients[0];
  const first = POSTS.find(p=>p.client===S.activeClient);
  S.activePost = first?.id || null;
  document.getElementById('authScreen').style.display='none';
  document.getElementById('appShell').classList.add('visible');
  if (!isAdmin){
    document.getElementById('clientBadge').style.display='flex';
    document.getElementById('clientBadgeLabel').textContent = CLIENTS[role]?.name || role;
  }
  renderAll();
}
function renderAll(){
  const isAdmin = S.role==='ADMIN';
  const el = document.getElementById('clientTabs');
  el.innerHTML = isAdmin ? Object.keys(CLIENTS).map(c =>
    `<button class="client-pill ${c===S.activeClient?'active':''}" onclick="setClient('${c}')">${c}</button>`).join('') : '';
  syncNav();
  renderMain();
}
function syncNav(){
  for (const v of ['Statement','Posts','Upcoming'])
    document.getElementById('btn'+v).classList.toggle('active', S.activeView===v.toLowerCase());
}
function setClient(c){
  S.activeClient = c;
  S.plat='all'; S.postPlat='all';
  const first = POSTS.find(p=>p.client===c);
  S.activePost = first?.id || null;
  S.activeView = 'statement';
  renderAll();
}
function setView(v){ S.activeView=v; syncNav(); renderMain(); }
function renderMain(){
  if (S.activeView==='posts') return renderPostsView();
  if (S.activeView==='upcoming') return renderUpcoming();
  renderStatement();
}

// ══════════════════════════════════════════════════════
// STATEMENT (landing)
// ══════════════════════════════════════════════════════
function stmtPosts(){
  let ps = POSTS.filter(p=>p.client===S.activeClient && (S.plat==='all'||p.platform===S.plat));
  let from=null, to=null;
  if (S.dateFrom) from = new Date(S.dateFrom);
  else if (S.periodDays){ from = new Date(); from.setDate(from.getDate()-S.periodDays); }
  if (S.dateTo) to = new Date(S.dateTo);
  if (from||to) ps = ps.filter(p=>{ const d=new Date(p.date);
    if (isNaN(d)) return true; if (from&&d<from) return false; if (to&&d>to) return false; return true; });
  return ps.sort((a,b)=> a.date<b.date?1:-1);
}
function setPeriod(d){ S.periodDays=d; S.dateFrom=''; S.dateTo=''; renderStatement(); }
function setDateRange(f,v){ if(f==='from')S.dateFrom=v; else S.dateTo=v; S.periodDays=null; renderStatement(); }
function setPlat(p){ S.plat=p; renderStatement(); }

function renderStatement(){
  const c = CLIENTS[S.activeClient];
  const plats = Object.keys(c.baselines);
  if (S.plat!=='all' && !plats.includes(S.plat)) S.plat='all';
  const ps = stmtPosts();
  const live = ps.filter(p=>p.checks['7d']);
  const pending = ps.filter(p=>!p.checks['7d']);
  const bl = c.baselines[S.plat==='all' ? plats[0] : S.plat];

  const winners = live.filter(p=>p.checks['7d'].outcome==='Winner');
  const winRate = live.length ? Math.round(winners.length/live.length*100) : 0;
  const avgV = live.length ? Math.round(live.reduce((s,p)=>s+(p.checks['7d'].views||0),0)/live.length) : 0;
  const saves = live.reduce((s,p)=>s+(p.checks['7d'].saves||0),0);
  const follows = live.reduce((s,p)=>s+(p.checks['7d'].follows||0),0);
  const views = live.reduce((s,p)=>s+(p.checks['7d'].views||0),0);
  const delta = bl ? Math.round((avgV-bl)/bl*100) : 0;

  let sTxt='Building momentum', sCls='', sSub=`avg views ${delta>=0?'above':'below'} baseline · win rate ${winRate}%`;
  if (!live.length){ sTxt='Awaiting data'; sSub='no completed 7d checks in this period'; }
  else if (winRate>=40 && avgV>=bl){ sTxt='In the green'; sCls='good'; }
  else if (winRate<20 && avgV<bl*0.7){ sTxt='Needs attention'; sCls='bad'; }

  const dates = ps.map(p=>p.date).sort();
  const range = dates.length ? `${dates[0]} — ${dates[dates.length-1]}` : 'no posts in period';
  const platLabel = S.plat==='all' ? plats.map(p=>p.toUpperCase()).join(' + ') : S.plat.toUpperCase();

  document.getElementById('mainContent').innerHTML = `
    <div class="controls">
      ${plats.length>1 ? `<div class="ctl-group"><span class="ctl-label">Platform</span>
        ${['all',...plats].map(p=>`<button class="ctl-btn ${p===S.plat?'on':''}" onclick="setPlat('${p}')">${p==='all'?'All':p.toUpperCase()}</button>`).join('')}</div>` : ''}
      <div class="ctl-group"><span class="ctl-label">Period</span>
        ${PERIODS.map(([lbl,d])=>`<button class="ctl-btn ${d===S.periodDays&&!S.dateFrom&&!S.dateTo?'on':''}" onclick="setPeriod(${d})">${lbl}</button>`).join('')}</div>
      <div class="ctl-group"><span class="ctl-label">Custom</span>
        <input type="date" class="date-input" value="${S.dateFrom}" onchange="setDateRange('from',this.value)">
        <span style="color:var(--muted)">→</span>
        <input type="date" class="date-input" value="${S.dateTo}" onchange="setDateRange('to',this.value)"></div>
    </div>

    <header class="masthead">
      <div>
        <div class="wordmark">the <em>receipts</em> · statement</div>
        <h1>${esc(c.name)}</h1>
        <div class="mast-meta">${platLabel} · ${range} · baseline <b>${fmtN(bl)}</b> views (rolling median, auto)</div>
      </div>
      <div class="stamp ${sCls}">${sTxt}<small>${sSub}</small></div>
    </header>

    <div class="tiles">
      <div class="tile"><div class="tile-label">Win rate</div><div class="tile-val">${winRate}%</div><div class="tile-sub">${winners.length} of ${live.length} posts beat baseline</div></div>
      <div class="tile"><div class="tile-label">Avg 7d views</div><div class="tile-val ${delta>=0?'up':'down'}">${fmtN(avgV)}</div><div class="tile-sub"><b class="${delta<0?'neg':''}">${delta>=0?'+':''}${delta}%</b> vs baseline ${fmtN(bl)}</div></div>
      <div class="tile"><div class="tile-label">Saves</div><div class="tile-val accent">${fmtN(saves)}</div><div class="tile-sub">content people kept</div></div>
      <div class="tile"><div class="tile-label">New follows</div><div class="tile-val accent">${fmtN(follows)}</div><div class="tile-sub">attributed to tracked posts</div></div>
    </div>

    <section class="sec">
      <div class="sec-hd"><span class="sec-no">§1</span><span class="sec-title">Pillar × Format</span>
        <span class="sec-why">avg 7d views · the "what should we make more of" table</span></div>
      <div id="matrix"></div>
    </section>

    <section class="sec">
      <div class="sec-hd"><span class="sec-no">§2</span><span class="sec-title">The period, on one line</span>
        <span class="sec-why">every post as a dot · height = 7d views · color = pillar · click a dot to open the post</span></div>
      <div class="chart-wrap"><div id="chart"></div></div>
      <div class="legend" id="legend"></div>
    </section>

    <section class="sec">
      <div class="sec-hd"><span class="sec-no">§3</span><span class="sec-title">The ledger</span>
        <span class="sec-why">every post in the period, newest first · click a row for the full breakdown</span></div>
      <div class="ledger" id="ledger"></div>
    </section>

    <div class="total">
      <div class="total-row">
        <span class="total-label">Total · ${S.dateFrom||S.dateTo ? 'custom range' : S.periodDays ? 'last '+S.periodDays+' days' : 'all time'}</span>
        <span class="total-vals">${fmtN(views)}<small>views</small> ${fmtN(saves)}<small>saves</small> ${fmtN(follows)}<small>follows</small></span>
      </div>
      <div class="fineprint">
        Baseline is the rolling median of the last 10 posts and updates itself · outcome tags recompute automatically when the baseline moves · blank means "not measured," never zero.
      </div>
      <div class="tear"></div>
    </div>
    <div id="adminLinks"></div>`;

  renderMatrix(c, live);
  renderChart(ps, live, pending, bl);
  renderLedger(ps, plats);
  renderAdminLinks();
}

function renderMatrix(c, live){
  const pillars = Object.entries(c.pillars||{});
  const withPillar = live.filter(p=>p.pillar);
  const el = document.getElementById('matrix');
  if (!withPillar.length){ el.innerHTML = '<div class="empty-period">no pillar-tagged posts in this period</div>'; return; }
  let maxV=1; const rows=[];
  for (const [pid,name] of pillars){
    const cells = FORMATS.map(f=>{
      const pp = withPillar.filter(p=>p.pillar===pid && (p.type||'Video')===f);
      if (!pp.length) return null;
      const avg = Math.round(pp.reduce((s,p)=>s+(p.checks['7d'].views||0),0)/pp.length);
      maxV = Math.max(maxV, avg);
      return {avg, n:pp.length, win:Math.round(pp.filter(p=>p.checks['7d'].outcome==='Winner').length/pp.length*100)};
    });
    if (cells.some(Boolean)) rows.push({pid,name,cells});
  }
  el.innerHTML = `<div class="matrix">
    <div class="mx mx-hdr"></div>${FORMATS.map(f=>`<div class="mx mx-hdr">${f}</div>`).join('')}
    ${rows.map(r=>`<div class="mx mx-pillar"><span class="pdot" style="background:${PCOLORS[r.pid]}"></span>${esc(r.name)}</div>
      ${r.cells.map(cell=>cell?`<div class="mx" style="background:color-mix(in srgb,var(--accent-bright) ${(4+14*cell.avg/maxV).toFixed(1)}%,var(--card))">
        <div class="mx-val">${fmtN(cell.avg)}</div><div class="mx-sub">${cell.n} post${cell.n!==1?'s':''} · ${cell.win>0?`<span class="mx-win">win ${cell.win}%</span>`:'win 0%'}</div>
      </div>`:'<div class="mx mx-empty">—</div>').join('')}`).join('')}
  </div>`;
}

function renderChart(ps, live, pending, bl){
  const el = document.getElementById('chart');
  if (!ps.length){ el.innerHTML = '<div class="empty-period">no posts in this period</div>'; document.getElementById('legend').innerHTML=''; return; }
  const W=940,H=290,L=64,R=920,T=30,B=260;
  const ds = ps.map(p=>new Date(p.date).getTime());
  let t0=Math.min(...ds), t1=Math.max(...ds);
  if (t0===t1){ t0-=86400e3; t1+=86400e3; }
  const maxRaw = Math.max(...live.map(p=>p.checks['7d'].views||0), bl, 1);
  const step = Math.pow(10, Math.floor(Math.log10(maxRaw)));
  const yMax = Math.ceil(maxRaw*1.05/step)*step;
  const X = t => L + (t-t0)/(t1-t0)*(R-L);
  const Y = v => B - v/yMax*(B-T);
  const gl=[]; for(let i=0;i<=4;i++){const y=T+(B-T)*i/4, v=yMax*(4-i)/4;
    gl.push(`<line x1="${L}" y1="${y}" x2="${R}" y2="${y}" stroke="var(--line)"/><text x="${L-8}" y="${y+3}" fill="var(--muted)" font-size="10" text-anchor="end">${v>=1000?(v/1000)+'k':v}</text>`);}
  const dots = live.map(p=>{const c7=p.checks['7d'];
    return `<circle class="dot" onclick="selectPost(${p.id})" cx="${X(new Date(p.date).getTime()).toFixed(1)}" cy="${Y(c7.views||0).toFixed(1)}" r="7" fill="${PCOLORS[p.pillar]||'var(--muted)'}" stroke="var(--card)" stroke-width="2"><title>${esc(p.title)} · ${p.date} · ${p.type||''} · ${fmtN(c7.views||0)} views · ${c7.outcome||''}</title></circle>`;}).join('');
  const pend = pending.map(p=>`<circle class="dot" onclick="selectPost(${p.id})" cx="${X(new Date(p.date).getTime()).toFixed(1)}" cy="${B}" r="6" fill="var(--paper)" stroke="var(--muted)" stroke-dasharray="2 2" stroke-width="1.5"><title>${esc(p.title)} · ${p.date} · awaiting 7d check</title></circle>`).join('');
  const top2 = [...live].sort((a,b)=>(b.checks['7d'].views||0)-(a.checks['7d'].views||0)).slice(0,2);
  const labels = top2.map(p=>{const x=X(new Date(p.date).getTime()), y=Y(p.checks['7d'].views||0);
    const short = p.title.length>22 ? p.title.slice(0,22)+'…' : p.title;
    const anchor = x>R-220 ? 'end' : 'start'; const dx = anchor==='end' ? -12 : 12;
    return `<text x="${(x+dx).toFixed(1)}" y="${(y-4).toFixed(1)}" fill="var(--ink2)" font-size="10.5">${anchor==='end'?`<tspan text-anchor="end">${esc(short)} · ${((p.checks['7d'].views||0)/1000).toFixed(1)}k</tspan>`:`${esc(short)} · ${((p.checks['7d'].views||0)/1000).toFixed(1)}k`}</text>`;}).join('');
  const midT=(t0+t1)/2;
  const dt = t => new Date(t).toLocaleDateString('en-US',{month:'short',day:'numeric'});
  el.innerHTML = `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="7-day views per post over time, colored by pillar">
    <g font-family="'DM Mono',monospace">${gl.join('')}
    <line x1="${L}" y1="${Y(bl).toFixed(1)}" x2="${R}" y2="${Y(bl).toFixed(1)}" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="6 5"/>
    <text x="${R}" y="${(Y(bl)-6).toFixed(1)}" fill="var(--accent)" font-size="10" text-anchor="end">baseline ${fmtN(bl)}</text>
    ${dots}${pend}${labels}
    <g fill="var(--muted)" font-size="10">
      <text x="${L}" y="282" text-anchor="middle">${dt(t0)}</text>
      <text x="${X(midT).toFixed(1)}" y="282" text-anchor="middle">${dt(midT)}</text>
      <text x="${R}" y="282" text-anchor="end">${dt(t1)}</text>
    </g></g></svg>`;
  const c = CLIENTS[S.activeClient];
  document.getElementById('legend').innerHTML = Object.entries(c.pillars||{}).map(([pid,name])=>
    `<span><span class="pdot" style="background:${PCOLORS[pid]}"></span>${esc(name)}</span>`).join('') +
    (pending.length?`<span><span class="pdot" style="background:var(--paper);border:1.5px dashed var(--muted)"></span>awaiting 7d check</span>`:'');
}

function renderLedger(ps, plats){
  const el = document.getElementById('ledger');
  if (!ps.length){ el.innerHTML = '<div class="empty-period">no posts in this period</div>'; return; }
  const platCol = plats.length>1 && S.plat==='all';
  const c = CLIENTS[S.activeClient];
  const rows = ps.map(p=>{
    const c7=p.checks['7d']||{};
    const d = p.date.slice(5).replace('-','·');
    const pillar = p.pillar ? `<span class="pill"><span class="pdot" style="background:${PCOLORS[p.pillar]}"></span>${esc(((c.pillars||{})[p.pillar]||p.pillar).replace(/^[^ ]+ /,''))}</span>` : '—';
    const ret = c7.watchTimePct!=null ? c7.watchTimePct+'% watch' : c7.revisitRatio!=null ? c7.revisitRatio+'× revisit' : '—';
    const out = !p.checks['7d'] ? `<span class="tag pending">due ${(p.dueChecks&&p.dueChecks['7d'])||'soon'}</span>`
      : c7.outcome==='Winner' ? '<span class="tag win">Winner</span>'
      : c7.outcome==='Underperformed' ? '<span class="tag under">Under</span>'
      : c7.outcome ? '<span class="tag learn">'+esc(c7.outcome)+'</span>' : '—';
    const act = c7.nextAction==='Repeat' ? '<span class="action repeat">Repeat ↻</span>'
      : c7.nextAction==='Drop' ? '<span class="action drop">Drop ✕</span>'
      : c7.nextAction ? '<span class="action">'+esc(c7.nextAction)+'</span>' : '<span class="action">—</span>';
    return `<tr class="rowlink" onclick="selectPost(${p.id})"><td>${d}</td>${platCol?`<td class="plat-mini">${p.platform.toUpperCase()}</td>`:''}
      <td class="title">${esc(p.title)}</td><td>${pillar}</td><td>${p.type||'—'}</td>
      <td class="num">${c7.views!=null?fmtN(c7.views):'—'}</td>
      <td class="num">${c7.saveRate!=null?c7.saveRate+'%':'—'}</td>
      <td class="num">${ret}</td><td>${out}</td><td>${act}</td></tr>`;
  }).join('');
  el.innerHTML = `<table>
    <thead><tr><th>Date</th>${platCol?'<th>Plat</th>':''}<th>Post</th><th>Pillar</th><th>Type</th>
    <th class="num">7d views</th><th class="num">Save rate</th><th class="num">Retention</th><th>Outcome</th><th>Action</th></tr></thead>
    <tbody>${rows}</tbody></table>`;
}

function renderAdminLinks(){
  const el = document.getElementById('adminLinks');
  if (S.role!=='ADMIN' || !el) return;
  const base = window.location.origin + window.location.pathname;
  el.innerHTML = `<div class="share-links"><div class="share-title">Client share links</div>
    ${Object.entries(ACCESS_KEYS).filter(([,v])=>v!=='ADMIN').map(([key,client])=>`
      <div class="url-item"><div><div class="url-cname">${client}</div><div class="url-str">${base}?key=${key}</div></div>
      <button class="url-copy" onclick="copyUrl('${base}?key=${key}',this)">Copy</button></div>`).join('')}
  </div>`;
}
function copyUrl(url,btn){ navigator.clipboard.writeText(url).then(()=>{ btn.textContent='Copied!'; setTimeout(()=>btn.textContent='Copy',2000); }); }

// ══════════════════════════════════════════════════════
// POSTS VIEW (detail)
// ══════════════════════════════════════════════════════
function selectPost(id){
  S.activePost = id;
  S.activeView = 'posts';
  const post = POSTS.find(p=>p.id===id);
  S.activeCheck = ['7d','30d'].find(c=>post?.checks[c]) || '7d';
  syncNav(); renderMain();
}
function setCheck(c){ S.activeCheck=c; renderMain(); }
function setPostPlat(p){ S.postPlat=p; renderMain(); }

function renderPostsView(){
  const c = CLIENTS[S.activeClient];
  const plats = Object.keys(c.baselines);
  const posts = POSTS.filter(p=>p.client===S.activeClient && (S.postPlat==='all'||p.platform===S.postPlat));
  const post = POSTS.find(p=>p.id===S.activePost && p.client===S.activeClient) || posts[0];
  if (post && post.id!==S.activePost){ S.activePost=post.id; S.activeCheck=['7d','30d'].find(k=>post.checks[k])||'7d'; }

  const list = posts.length ? posts.map(p=>{
    const dots = ['7d','30d'].map(k=>{
      const done=!!p.checks[k], due=!done&&p.dueChecks?.[k];
      return `<div class="cdot ${done?'done':due?'due':''}">${k.replace('d','')}</div>`;
    }).join('');
    return `<div class="prow ${p.id===S.activePost?'active':''}" onclick="selectPost(${p.id})">
      <div class="prow-top"><div class="prow-title">${esc(p.title)}</div><div class="mini-pdot pdot ${p.platform}"></div></div>
      <div class="prow-meta"><div class="prow-date">${p.date}</div><div class="cdots">${dots}</div></div></div>`;
  }).join('') : '<div style="padding:14px;font-size:10px;color:var(--muted)">No posts found</div>';

  document.getElementById('mainContent').innerHTML = `<div class="posts-layout">
    <div class="plist-box">
      ${plats.length>1?`<div class="pf-row">
        ${['all',...plats].map(p=>`<button class="ctl-btn ${p===S.postPlat?'on':''}" onclick="setPostPlat('${p}')">${p==='all'?'All':p.toUpperCase()}</button>`).join('')}</div>`:''}
      <div id="postList">${list}</div>
    </div>
    <div id="postDetail"></div>
  </div>`;
  renderPostDetail(post);
}

function renderPostDetail(post){
  const el = document.getElementById('postDetail');
  if (!post){ el.innerHTML = `<div class="empty-state"><div class="ei">🧾</div><div class="et">Select a post</div></div>`; return; }
  const c = CLIENTS[S.activeClient];
  const baseline = c.baselines[post.platform] ?? Object.values(c.baselines)[0];
  const check = post.checks[S.activeCheck];
  const outcome = post.checks['7d']?.outcome;
  const tabs = ['7d','30d'].map(k=>{
    const done=!!post.checks[k], due=post.dueChecks?.[k];
    const cls = k===S.activeCheck?'active':(!done&&!due?'locked':due&&!done?'due':'');
    return `<button class="ctab ${cls}" ${(done||due)?`onclick="setCheck('${k}')"`:''}>${k}${due&&!done?` — due ${due}`:''}</button>`;
  }).join('');
  el.innerHTML = `
    <div class="post-hdr">
      <div>
        <div class="post-hl">"${esc(post.title)}"${post.link?`<a class="post-link-out" href="${esc(post.link)}" target="_blank" rel="noopener">View post ↗</a>`:''}</div>
        <div class="meta-row">
          <div class="meta-chip"><div class="pdot ${post.platform}"></div>${platName(post.platform)}</div>
          <div class="meta-chip">Posted ${post.date}</div>
          <div class="meta-chip">${post.type||''}</div>
          ${post.pillar?`<div class="meta-chip"><span class="pdot" style="background:${PCOLORS[post.pillar]}"></span>${esc((c.pillars||{})[post.pillar]||post.pillar)}</div>`:''}
        </div>
      </div>
      ${outcome?`<div class="otag ${outcome.toLowerCase()}">${outcome}</div>`:''}
    </div>
    <div class="ctabs">${tabs}</div>
    ${check ? renderCheck(check, post, baseline) : `<div class="empty-state"><div class="ei">⏳</div><div class="et">${S.activeCheck} check pending</div><div class="es">${post.dueChecks?.[S.activeCheck]?`Due ${post.dueChecks[S.activeCheck]}. Run /track-post in Claude Code.`:"Check window hasn't opened yet."}</div></div>`}`;
}

function renderCheck(c, post, bl){
  const is7 = S.activeCheck==='7d';
  const is30 = S.activeCheck==='30d';
  const bp = c.views ? Math.round((c.views/bl)*100) : 0;
  const mc = (lbl,val,cls,sub,) => (val==null||val==='undefined'||(typeof val==='number'&&isNaN(val))) ? '' :
    `<div class="mc"><div class="mc-lbl">${lbl}</div><div class="mc-val ${cls}">${val}</div><div class="mc-sub">${sub}</div></div>`;
  const rc = (n,v,cl,pct) => `<div class="rc"><div class="rc-top"><span class="rc-name">${n}</span><span class="rc-val ${cl}">${v}</span></div><div class="bt"><div class="bf ${cl}" style="width:${pct}%"></div></div></div>`;
  const ac = (t,col,sel,crit) => {
    const rows = crit.map(([met,lbl])=>`<div class="${met?'cm':'cu'}">${met?'✓':'—'} ${lbl}</div>`).join('');
    return `<div class="ac ${sel?`sel-${t.toLowerCase()}`:''}"><div class="ac-title ${col}">${sel?'✓ ':''}${t}</div><div class="cl">${rows}</div></div>`;
  };
  const isVid = post.type==='Video';
  return `
    <div class="mgrid">
      ${mc('Views',c.views?.toLocaleString(),bp>120?'g':bp<80?'r':'o',`${bp}% of baseline`)}
      ${mc('Unique Viewers',c.uniqueViewers?.toLocaleString(),'n', c.views?`${Math.round((c.uniqueViewers/c.views)*100)}% unique`:'')}
      ${mc('Non-Follower %',c.nonFollowerPct!=null?c.nonFollowerPct+'%':null,c.nonFollowerPct>60?'g':'o',c.nonFollowerPct>60?'algo pushing':'mostly followers')}
      ${mc('Watch Time %',c.watchTimePct!=null?c.watchTimePct+'%':null,c.watchTimePct>=30?'g':c.watchTimePct<20?'r':'o',c.watchTimeSec!=null?c.watchTimeSec+'s avg':'')}
      ${mc('Revisit Ratio',c.revisitRatio!=null?c.revisitRatio+'×':null,c.revisitRatio>=1.3?'g':c.revisitRatio<1.1?'r':'o','views per person')}
      ${mc('Profile Visits',c.profileVisits?.toLocaleString(),'n','from this post')}
      ${mc('Link Taps',c.linkTaps?.toLocaleString(),c.linkTaps>0?'g':'n','external link')}
    </div>
    ${is7?`
    <div class="tgrid">
      <div class="tc"><div class="tc-cat">Views vs Baseline</div><div class="tc-val ${bp>120?'g':bp<80?'r':'o'}">${bp}%</div><div class="tc-desc">${c.views?.toLocaleString()} vs ${bl?.toLocaleString()} baseline</div></div>
      ${c.outcome?`<div class="tc"><div class="tc-cat">Outcome</div><div class="tc-val ${c.outcome==='Winner'?'g':c.outcome==='Underperformed'?'r':'o'}">${c.outcome}</div><div class="tc-desc">Reach + retention + saves criteria</div></div>`:''}
      ${c.comments!=null?`<div class="tc"><div class="tc-cat">Comments</div><div class="tc-val">${c.comments}</div></div>`:''}
      ${c.follows!=null?`<div class="tc"><div class="tc-cat">Follows attributed</div><div class="tc-val ${c.follows>0?'g':''}">${c.follows}</div></div>`:''}
    </div>
    <div class="shd">Calculated rates</div>
    <div class="rgrid">
      ${c.saveRate!=null?rc('Save Rate',c.saveRate+'%',c.saveRate>1?'g':c.saveRate>0.5?'o':'r',Math.min(c.saveRate*33,100)):''}
      ${c.shareRate!=null?rc('Share Rate',c.shareRate+'%',c.shareRate>1?'g':'o',Math.min(c.shareRate*25,100)):''}
    </div>
    <div class="shd">Next action</div>
    <div class="agrid">
      ${ac('Repeat','g',c.nextAction==='Repeat',[[c.views>bl*1.2,'Above baseline views (>120%)'],[isVid?c.watchTimePct>=30:c.revisitRatio>=1.3,isVid?'Watch time ≥30%':'Revisit ratio ≥1.3×'],[c.saveRate>=1,'Save rate ≥1%'],[c.follows>0||c.linkTaps>0,'Follows or link taps attributed']])}
      ${ac('Iterate','o',c.nextAction==='Iterate',[[c.outcome==='Learning','Outcome = Learning'],[(isVid?c.watchTimePct>=30:c.revisitRatio>=1.3)&&c.views<bl,'Good retention + low reach'],[c.views>bl&&c.saveRate<0.5,'Good reach + weak saves'],[false,'Strong topic, weak execution']])}
      ${ac('Drop','r',c.nextAction==='Drop',[[c.views<bl*0.8,'Below baseline views (<80%)'],[isVid?c.watchTimePct<20:c.revisitRatio<1.1,isVid?'Watch time <20%':'Revisit ratio <1.1×'],[c.saves===0&&c.shares===0,'Zero saves + zero shares'],[c.outcome==='Underperformed','Outcome = Underperformed']])}
    </div>`:''}
    ${is30?`
    <div class="shd">Long-tail performance</div>
    <div class="mgrid">
      ${mc('Long-Tail Views',c.longTailViews?.toLocaleString(),'n',c.longTailPct!=null?c.longTailPct+'% of total':'')}
      ${mc('Long-Tail %',c.longTailPct!=null?c.longTailPct+'%':null,c.longTailPct>15?'g':'o','views after day 7')}
      ${mc('Saves',c.saves?.toLocaleString(),'n','','')}
      ${mc('Shares',c.shares?.toLocaleString(),'n','','')}
      ${mc('Follows',c.follows!=null?String(c.follows):null,c.follows>0?'g':'o','attributed')}
    </div>`:''}
    ${(post.whyItPerformed||post.hookInsight)?`<div class="shd">Notes</div>
    ${post.whyItPerformed?`<div class="nb"><div class="nb-lbl">Why It Performed</div><div class="nb-text">${esc(post.whyItPerformed)}</div></div>`:''}
    ${post.hookInsight?`<div class="nb"><div class="nb-lbl">Hook Insight</div><div class="nb-text">${esc(post.hookInsight)}</div></div>`:''}
    `:''}`;
}

// ══════════════════════════════════════════════════════
// UPCOMING
// ══════════════════════════════════════════════════════
function renderUpcoming(){
  const allDue=[];
  POSTS.filter(p=>p.client===S.activeClient).forEach(p=>{
    Object.entries(p.dueChecks||{}).forEach(([check,date])=>allDue.push({post:p,check,date,dateObj:new Date(date)}));
  });
  allDue.sort((a,b)=>a.dateObj-b.dateObj);
  const today = new Date(); today.setHours(0,0,0,0);
  const isToday = d => { const dd=new Date(d); dd.setHours(0,0,0,0); return dd<=today; };
  const row = item => `<div class="dr" onclick="selectPost(${item.post.id})">
    <div><div class="dr-title">${esc(item.post.title)}</div><div class="dr-meta">${platName(item.post.platform)} · Posted ${item.post.date}</div></div>
    <div class="dr-right"><div class="dw ${isToday(item.dateObj)?'today':'soon'}">${isToday(item.dateObj)?'Due now':item.date}</div><div class="dc">${item.check} check</div></div></div>`;
  const dueNow = allDue.filter(d=>isToday(d.dateObj));
  const later = allDue.filter(d=>!isToday(d.dateObj));
  document.getElementById('mainContent').innerHTML = `
    <div class="sec" style="margin-top:0">
      <div class="sec-hd"><span class="sec-no">⏰</span><span class="sec-title">Due now</span></div>
      ${dueNow.length?dueNow.map(row).join(''):'<div class="empty-period">nothing due — go make something</div>'}
    </div>
    <div class="sec">
      <div class="sec-hd"><span class="sec-no">→</span><span class="sec-title">Coming up</span></div>
      ${later.length?later.map(row).join(''):'<div class="empty-period">no scheduled checks</div>'}
    </div>`;
}

init();
</script>
