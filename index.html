<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Receipts</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300;1,9..144,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#ffffff;--surface:#fafaf8;--surface2:#f4f2ee;--border:#e8e0d8;--border2:#ddd5cb;
  --text:#1a1614;--text2:#7a7068;--muted:#b0a898;
  --accent:#EB8201;--accent-dim:rgba(235,130,1,0.08);
  --warn:#d4a000;--warn-dim:rgba(212,160,0,0.08);
  --danger:#cc3333;--danger-dim:rgba(204,51,51,0.08);
  --instagram:#e1306c;--tiktok:#0f9ea8;--orange:#EB8201;--cream:#FFF7CE;--repeat:#2a8a3e;--repeat-dim:rgba(42,138,62,0.08);--iterate:#c8a000;--iterate-dim:rgba(200,160,0,0.08);--drop:#cc3333;--drop-dim:rgba(204,51,51,0.08);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;}

/* ── AUTH ── */
#authScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
#authScreen::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(198,241,53,0.05) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;}
.auth-box{width:420px;padding:48px;border:1px solid var(--border2);background:var(--surface);animation:fadeUp 0.5s ease both;}
.auth-logo{font-family:'Fraunces',serif;font-size:26px;font-weight:300;margin-bottom:4px;letter-spacing:-0.5px;}
.auth-logo em{font-style:italic;color:var(--orange);}
.auth-tagline{font-size:10px;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:32px;}
.auth-label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text2);margin-bottom:8px;}
.auth-input{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-family:'DM Mono',monospace;font-size:12px;padding:11px 14px;outline:none;transition:border-color 0.15s;margin-bottom:14px;}
.auth-input:focus{border-color:var(--accent);}
.auth-input::placeholder{color:var(--muted);}
.auth-btn{width:100%;padding:12px;background:var(--orange);color:#fff;border:none;font-family:'DM Mono',monospace;font-size:12px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:opacity 0.15s;}
.auth-btn:hover{opacity:0.88;}
.auth-error{font-size:11px;color:var(--danger);margin-top:10px;display:none;}
.auth-note{font-size:10px;color:var(--muted);margin-top:18px;line-height:1.7;text-align:center;}

/* ── APP ── */
#appShell{display:none;height:100vh;flex-direction:column;}
#appShell.visible{display:flex;}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:54px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--orange) !important;}
.topbar-logo{font-family:'Fraunces',serif;font-size:17px;font-weight:300;letter-spacing:-0.3px;color:#fff;}
.topbar-logo em{font-style:italic;color:var(--cream);}
.topbar-center{display:flex;gap:3px;}
.client-pill{padding:5px 13px;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;border:1px solid rgba(255,255,255,0.3);background:transparent;color:rgba(255,255,255,0.7);cursor:pointer;font-family:'DM Mono',monospace;transition:all 0.12s;}
.client-pill.active{background:#fff;color:var(--orange);border-color:#fff;font-weight:500;}
.client-pill:hover:not(.active){color:#fff;border-color:rgba(255,255,255,0.6);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.sync-dot-wrap{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);}
.sync-dot{width:5px;height:5px;border-radius:50%;background:#fff;animation:pulse 2.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.client-badge{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text2);padding:5px 12px;border:1px solid var(--border2);}
.client-badge-dot{width:6px;height:6px;border-radius:50%;background:#fff;}
.nav-btn{padding:5px 12px;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;border:1px solid rgba(255,255,255,0.3);background:transparent;color:rgba(255,255,255,0.7);cursor:pointer;font-family:'DM Mono',monospace;transition:all 0.12s;}
.nav-btn.active{color:#fff;border-color:#fff;}

/* BODY */
.body-layout{display:grid;grid-template-columns:258px 1fr;flex:1;overflow:hidden;}
.sidebar{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--surface2);}
.sidebar-top{padding:18px 16px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.baseline-header{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.bl-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);}
.bl-row:last-child{border-bottom:none;}
.bl-left{display:flex;align-items:center;gap:7px;}
.pdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.pdot.ig{background:var(--instagram);}
.pdot.tt{background:var(--tiktok);}
.bl-name{font-size:10px;color:var(--text2);}
.bl-val{font-family:'Fraunces',serif;font-size:16px;font-weight:600;}
.post-scroll{flex:1;overflow-y:auto;padding:10px 8px;}
.post-scroll::-webkit-scrollbar{width:3px;}
.post-scroll::-webkit-scrollbar-thumb{background:var(--border2);}
.ssl{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);padding:0 8px;margin:6px 0 8px;}
.prow{padding:10px;border:1px solid transparent;cursor:pointer;transition:all 0.1s;margin-bottom:3px;}
.prow:hover{background:var(--surface2);border-color:var(--border);}
.prow.active{background:var(--surface2);border-color:var(--border2);}
.prow.active .prow-title{color:var(--text);}
.prow-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;gap:8px;}
.prow-title{font-size:11px;color:var(--text2);line-height:1.35;flex:1;}
.mini-pdot{width:5px;height:5px;border-radius:50%;margin-top:4px;flex-shrink:0;}
.prow-meta{display:flex;align-items:center;justify-content:space-between;}
.prow-date{font-size:10px;color:var(--muted);}
.cdots{display:flex;gap:3px;}
.cdot{width:15px;height:15px;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--muted);}
.cdot.done{border-color:var(--orange);color:var(--orange);background:var(--accent-dim);}
.cdot.due{border-color:var(--warn);color:var(--warn);background:var(--warn-dim);animation:glow 2s infinite;}
@keyframes glow{0%,100%{box-shadow:none;}50%{box-shadow:0 0 5px rgba(240,168,48,0.35);}}

/* PLATFORM FILTER */
.pf-row{display:flex;gap:3px;margin-bottom:8px;padding:0 8px;}
.pf-btn{padding:3px 9px;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Mono',monospace;transition:all 0.1s;}
.pf-btn.active.ig{border-color:var(--instagram);color:var(--instagram);}
.pf-btn.active.tt{border-color:var(--tiktok);color:var(--tiktok);}
.pf-btn.active.all{border-color:var(--orange);color:var(--orange);}

/* MAIN */
.main-content{overflow-y:auto;padding:26px 30px;background:var(--bg);}
.main-content::-webkit-scrollbar{width:3px;}
.main-content::-webkit-scrollbar-thumb{background:var(--border2);}
.post-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;padding-bottom:18px;border-bottom:1px solid var(--border);}
.post-hl{font-family:'Fraunces',serif;font-size:27px;font-weight:300;line-height:1.1;margin-bottom:9px;letter-spacing:-0.5px;}
.post-hl em{font-style:italic;color:var(--accent);}
.meta-row{display:flex;gap:14px;}
.meta-chip{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text2);}
.otag{padding:7px 16px;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;font-weight:500;align-self:flex-start;flex-shrink:0;}
.otag.winner{background:var(--repeat);color:#fff;}
.otag.learning{background:var(--warn);color:var(--bg);}
.otag.underperformed{background:var(--danger);color:#fff;}
.otag.testing{background:var(--surface2);color:var(--muted);border:1px solid var(--border2);}
.ctabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:22px;}
.ctab{padding:8px 16px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.12s;}
.ctab.active{color:var(--orange);border-bottom-color:var(--orange);}
.ctab:hover:not(.active):not(.locked){color:var(--text2);}
.ctab.locked{color:var(--border2);cursor:default;}
.ctab.due{color:var(--warn);}
.mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
.mc{background:var(--surface);border:1px solid var(--border);padding:15px 13px;position:relative;overflow:hidden;animation:fadeUp 0.3s ease both;}
.mc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--border);}
.mc.pos::after{background:var(--accent);}
.mc.neu::after{background:var(--warn);}
.mc.neg::after{background:var(--danger);}
.mc-lbl{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:9px;}
.mc-val{font-family:'Fraunces',serif;font-size:30px;font-weight:600;line-height:1;margin-bottom:4px;}
.mc-val.g{color:var(--accent);}
.mc-val.o{color:var(--warn);}
.mc-val.r{color:var(--danger);}
.mc-val.n{color:var(--text);}
.mc-sub{font-size:10px;color:var(--muted);}
.tgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
.tc{background:var(--surface);border:1px solid var(--border);padding:13px;animation:fadeUp 0.3s ease both;}
.tc-cat{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.tc-val{font-size:11px;font-weight:500;margin-bottom:3px;}
.tc-val.g{color:var(--repeat);}
.tc-val.o{color:var(--warn);}
.tc-val.r{color:var(--danger);}
.tc-desc{font-size:10px;color:var(--muted);line-height:1.5;}
.shd{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.rgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
.rc{background:var(--surface);border:1px solid var(--border);padding:13px;}
.rc-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px;}
.rc-name{font-size:10px;color:var(--text2);}
.rc-val{font-size:15px;font-family:'Fraunces',serif;font-weight:600;}
.rc-val.g{color:var(--accent);}
.rc-val.o{color:var(--warn);}
.rc-val.r{color:var(--danger);}
.bt{height:2px;background:var(--border2);}
.bf{height:100%;transition:width 0.7s cubic-bezier(0.16,1,0.3,1);}
.bf.g{background:var(--repeat);}
.bf.o{background:var(--warn);}
.bf.r{background:var(--danger);}
.agrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
.ac{background:var(--surface);border:2px solid var(--border);padding:16px;}
.ac.sel-repeat{border-color:var(--repeat);background:var(--repeat-dim);}
.ac.sel-iterate{border-color:var(--iterate);background:var(--iterate-dim);}
.ac.sel-drop{border-color:var(--drop);background:var(--drop-dim);}
.ac-title{font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px;}
.ac-title.g{color:var(--repeat);}
.ac-title.o{color:var(--iterate);}
.ac-title.r{color:var(--drop);}
.cl{font-size:10px;line-height:2;}
.cm{color:var(--repeat);}
.cu{color:var(--border2);}
.nb{background:var(--surface);border:1px solid var(--border);padding:14px;margin-bottom:18px;}
.nb textarea{width:100%;background:transparent;border:none;color:var(--text2);font-family:'DM Mono',monospace;font-size:12px;resize:none;outline:none;line-height:1.7;min-height:65px;}
.nb textarea::placeholder{color:var(--muted);}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:280px;color:var(--muted);gap:8px;text-align:center;}
.ei{font-size:30px;opacity:0.35;margin-bottom:4px;}
.et{font-size:13px;color:var(--text2);}
.es{font-size:11px;max-width:260px;line-height:1.6;}
.uh{font-family:'Fraunces',serif;font-size:24px;font-weight:300;margin-bottom:5px;}
.uh em{font-style:italic;color:var(--accent);}
.usub{font-size:11px;color:var(--muted);margin-bottom:24px;}
.dl{font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid var(--border);}
.dr{display:flex;justify-content:space-between;align-items:center;padding:13px 15px;background:var(--surface);border:1px solid var(--border);margin-bottom:5px;cursor:pointer;transition:border-color 0.1s;}
.dr:hover{border-color:var(--border2);}
.dr-title{font-size:12px;margin-bottom:3px;}
.dr-meta{font-size:10px;color:var(--muted);}
.dr-right{text-align:right;}
.dw{font-size:11px;font-weight:500;margin-bottom:2px;}
.dw.today{color:var(--warn);}
.dw.soon{color:var(--text2);}
.dc{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);}

/* ADMIN URL SECTION */
.url-section{margin-top:18px;padding-top:14px;border-top:1px solid var(--border);}
.url-sec-label{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.url-item{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);margin-bottom:4px;}
.url-cname{font-size:10px;color:var(--text2);margin-bottom:2px;}
.url-str{font-size:9px;color:var(--muted);word-break:break-all;max-width:160px;}
.url-copy{font-size:9px;color:var(--accent);cursor:pointer;background:none;border:1px solid var(--border);font-family:'DM Mono',monospace;padding:2px 7px;transition:all 0.1s;flex-shrink:0;margin-left:8px;}
.url-copy:hover{background:var(--accent-dim);border-color:var(--accent);}

@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.mc:nth-child(1){animation-delay:.04s;}.mc:nth-child(2){animation-delay:.08s;}.mc:nth-child(3){animation-delay:.12s;}.mc:nth-child(4){animation-delay:.16s;}

/* INSIGHTS */

.filter-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:20px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);}
.filter-group{display:flex;align-items:center;gap:6px;}
.filter-group-label{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);flex-shrink:0;}
.filter-sep{width:1px;height:20px;background:var(--border2);}
.ins-best-post{background:var(--surface);border:2px solid var(--orange);padding:20px;margin-bottom:24px;display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center;}
.ins-best-label{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--orange);margin-bottom:6px;}
.ins-best-title{font-family:'Fraunces',serif;font-size:20px;font-weight:300;font-style:italic;margin-bottom:8px;color:var(--text);}
.ins-best-meta{font-size:10px;color:var(--muted);}
.ins-best-stats{display:flex;gap:20px;}
.ins-best-stat{text-align:center;}
.ins-best-stat-val{font-family:'Fraunces',serif;font-size:22px;font-weight:600;color:var(--orange);}
.ins-best-stat-label{font-size:9px;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;}
.ins-health{display:flex;align-items:center;gap:12px;padding:14px 18px;margin-bottom:24px;border:1px solid var(--border);}
.ins-health-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.ins-health-dot.green{background:var(--repeat);}
.ins-health-dot.orange{background:var(--orange);}
.ins-health-dot.red{background:var(--drop);}
.ins-health-text{font-size:12px;color:var(--text);}
.ins-health-sub{font-size:10px;color:var(--muted);}
.ins-format-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px;}
.ins-format-card{background:var(--surface);border:1px solid var(--border);padding:14px;}
.ins-format-name{font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.ins-format-val{font-family:'Fraunces',serif;font-size:24px;font-weight:600;color:var(--text);margin-bottom:2px;}
.ins-format-sub{font-size:10px;color:var(--muted);}
.ins-format-bar{height:3px;margin-top:10px;background:var(--border2);border-radius:2px;overflow:hidden;}
.ins-format-bar-fill{height:100%;border-radius:2px;background:var(--orange);}
.ins-evergreen-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:11px;}
.ins-evergreen-row:last-child{border-bottom:none;}
.ins-evergreen-title{color:var(--text);flex:1;margin-right:12px;}
.ins-evergreen-views{color:var(--repeat);font-weight:500;white-space:nowrap;}
.tf-row{display:flex;gap:3px;margin-bottom:0;}
.tf-btn{padding:4px 10px;font-size:9px;letter-spacing:0.08em;text-transform:uppercase;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Mono',monospace;transition:all 0.1s;}
.tf-btn.active{background:var(--orange);color:#fff;border-color:var(--orange);}
.tf-btn:hover:not(.active){color:var(--text);border-color:var(--text2);}

.ins-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.ins-card{background:var(--surface);border:1px solid var(--border);padding:18px;animation:fadeUp 0.3s ease both;}
.ins-card-label{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.ins-card-val{font-family:'Fraunces',serif;font-size:36px;font-weight:600;line-height:1;margin-bottom:4px;}
.ins-card-sub{font-size:10px;color:var(--muted);}
.ins-card-val.orange{color:var(--orange);}
.ins-card-val.green{color:var(--repeat);}
.ins-card-val.red{color:var(--drop);}
.ins-section{margin-bottom:28px;}
.ins-section-title{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.ins-bar-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.ins-bar-label{font-size:11px;color:var(--text);width:260px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ins-bar-track{flex:1;height:6px;background:var(--border2);border-radius:3px;overflow:hidden;}
.ins-bar-fill{height:100%;border-radius:3px;transition:width 0.7s cubic-bezier(0.16,1,0.3,1);}
.ins-bar-fill.orange{background:var(--orange);}
.ins-bar-fill.green{background:var(--repeat);}
.ins-bar-fill.red{background:var(--drop);}
.ins-bar-num{font-size:11px;color:var(--text2);width:60px;text-align:right;flex-shrink:0;}
.ins-two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;}
.ins-panel{background:var(--surface);border:1px solid var(--border);padding:18px;}
.ins-panel-title{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
.outcome-pill{display:inline-block;font-size:9px;letter-spacing:0.08em;text-transform:uppercase;padding:3px 8px;margin-right:4px;margin-bottom:4px;font-weight:500;}
.outcome-pill.winner{background:var(--repeat-dim);color:var(--repeat);border:1px solid var(--repeat);}
.outcome-pill.learning{background:var(--warn-dim);color:var(--warn);border:1px solid var(--warn);}
.outcome-pill.underperformed{background:var(--danger-dim);color:var(--danger);border:1px solid var(--danger);}
.outcome-pill.testing{background:var(--surface2);color:var(--muted);border:1px solid var(--border2);}
.ins-insight-row{padding:10px 0;border-bottom:1px solid var(--border);font-size:11px;color:var(--text2);line-height:1.6;}
.ins-insight-row:last-child{border-bottom:none;}
.ins-insight-row strong{color:var(--text);font-weight:500;}
.ins-donut-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}

// STATE

let S = { role:null, activeClient:null, activePost:null, activeCheck:'7d', activeView:'posts', platFilter:'all', timeframe:'all', postType:'all', outcomeFilter:'all' };

// ══════════════════════════════════════════════════════
// INIT — check URL key param first
// ══════════════════════════════════════════════════════
function init() {
  const params = new URLSearchParams(window.location.search);
  const k = params.get('key');
  if (k && ACCESS_KEYS[k]) startSession(ACCESS_KEYS[k]);
}

function login() {
  const k = document.getElementById('keyInput').value.trim();
  if (ACCESS_KEYS[k]) { startSession(ACCESS_KEYS[k]); }
  else {
    document.getElementById('authError').style.display = 'block';
    document.getElementById('keyInput').style.borderColor = 'var(--danger)';
  }
}

function startSession(role) {
  S.role = role;
  const isAdmin = role === 'ADMIN';
  const clients = isAdmin ? Object.keys(CLIENTS) : [role];
  S.activeClient = clients[0];
  const first = POSTS.find(p => p.client === S.activeClient);
  S.activePost = first?.id || null;
  if (first) S.activeCheck = ['7d','24h','30d'].find(c => first.checks[c]) || '24h';
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('appShell').classList.add('visible');
  if (!isAdmin) {
    document.getElementById('clientBadge').style.display = 'flex';
    document.getElementById('clientBadgeLabel').textContent = CLIENTS[role]?.name || role;
  }
  renderAll(isAdmin, clients);
}

// ══════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════
function renderAll(isAdmin, clients) {
  isAdmin = isAdmin ?? S.role === 'ADMIN';
  clients = clients ?? (isAdmin ? Object.keys(CLIENTS) : [S.role]);
  renderClientTabs(isAdmin, clients);
  renderBaselines();
  renderPostList();
  renderMain();
  if (isAdmin && !document.getElementById('urlSection')) renderAdminUrls();
}

function renderClientTabs(isAdmin, clients) {
  const el = document.getElementById('clientTabs');
  if (!isAdmin) { el.innerHTML = ''; return; }
  el.innerHTML = clients.map(c =>
    `<button class="client-pill ${c===S.activeClient?'active':''}" onclick="setClient('${c}')">${c}</button>`
  ).join('');
}

function renderBaselines() {
  const c = CLIENTS[S.activeClient];
  document.getElementById('baselineBlock').innerHTML = `
    <div class="bl-row"><div class="bl-left"><div class="pdot ig"></div><div class="bl-name">Instagram</div></div><div class="bl-val">${c.baselines.ig.toLocaleString()}</div></div>
    <div class="bl-row"><div class="bl-left"><div class="pdot tt"></div><div class="bl-name">TikTok</div></div><div class="bl-val">${c.baselines.tt.toLocaleString()}</div></div>`;
}

function getFP() {
  return POSTS.filter(p => p.client===S.activeClient && (S.platFilter==='all'||p.platform===S.platFilter));
}

function renderPostList() {
  const posts = getFP();
  const el = document.getElementById('postList');
  if (!posts.length) { el.innerHTML = '<div style="padding:10px 8px;font-size:10px;color:var(--muted)">No posts found</div>'; return; }
  el.innerHTML = posts.map(p => {
    const dots = ['24h','7d','30d'].map(k => {
      const done = !!p.checks[k], due = !done && p.dueChecks?.[k];
      return `<div class="cdot ${done?'done':due?'due':''}">${k.replace('d','')}</div>`;
    }).join('');
    return `<div class="prow ${p.id===S.activePost?'active':''}" onclick="selectPost(${p.id})">
      <div class="prow-top"><div class="prow-title">${p.title}</div><div class="mini-pdot pdot ${p.platform}"></div></div>
      <div class="prow-meta"><div class="prow-date">${p.date}</div><div class="cdots">${dots}</div></div>
    </div>`;
  }).join('');
}

function renderMain() {
  if (S.activeView==='upcoming') { renderUpcoming(); return; }
  if (S.activeView==='insights') { renderInsights(); return; }
  const post = POSTS.find(p => p.id===S.activePost);
  if (!post) { document.getElementById('mainContent').innerHTML = `<div class="empty-state"><div class="ei">📊</div><div class="et">Select a post</div></div>`; return; }
  const check = post.checks[S.activeCheck];
  const baseline = CLIENTS[S.activeClient].baselines[post.platform];
  const outcome = check?.outcome;
  const tabs = ['24h','7d','30d'].map(k => {
    const done=!!post.checks[k], due=post.dueChecks?.[k];
    const cls = k===S.activeCheck?'active':(!done&&!due?'locked':due&&!done?'due':'');
    return `<button class="ctab ${cls}" ${(done||due)?`onclick="setCheck('${k}')"`:''}>${k}${due&&!done?` — due ${due}`:''}</button>`;
  }).join('');
  document.getElementById('mainContent').innerHTML = `
    <div style="animation:fadeUp 0.25s ease both">
      <div class="post-hdr">
        <div>
          <div class="post-hl">"<em>${post.title}</em>"</div>
          <div class="meta-row">
            <div class="meta-chip"><div class="pdot ${post.platform}"></div>${post.platform==='ig'?'Instagram':'TikTok'}</div>
            <div class="meta-chip" style="color:var(--muted)">Posted ${post.date}</div>
            <div class="meta-chip" style="color:var(--muted)">${post.duration}</div>
          </div>
        </div>
        ${outcome?`<div class="otag ${outcome.toLowerCase()}">${outcome}</div>`:''}
      </div>
      <div class="ctabs">${tabs}</div>
      ${check ? renderCheck(check, post, baseline) : `<div class="empty-state"><div class="ei">⏳</div><div class="et">${S.activeCheck} check pending</div><div class="es">${post.dueChecks?.[S.activeCheck]?`Due ${post.dueChecks[S.activeCheck]}. Run /track-post in Claude Code.`:"Check window hasn't opened yet."}</div></div>`}
    </div>`;
}

function renderCheck(c, post, bl) {
  const is7 = S.activeCheck==='7d';
  const bp = c.views ? Math.round((c.views/bl)*100) : 0;
  const dc = c.distribution?.includes('Above')||c.distribution?.includes('Promising')?'g':c.distribution?.includes('Below')||c.distribution?.includes('Weak')?'r':'o';
  const mc = (lbl,val,cls,sub,bar) => `<div class="mc ${bar}"><div class="mc-lbl">${lbl}</div><div class="mc-val ${cls}">${val}</div><div class="mc-sub">${sub}</div></div>`;
  const rc = (n,v,cl,pct) => `<div class="rc"><div class="rc-top"><span class="rc-name">${n}</span><span class="rc-val ${cl}">${v}</span></div><div class="bt"><div class="bf ${cl}" style="width:${pct}%"></div></div></div>`;
  const ac = (t,col,sel,crit) => {
    const rows = crit.map(([met,lbl])=>`<div class="${met?'cm':'cu'}">${met?'✓':'—'} ${lbl}</div>`).join('');
    return `<div class="ac ${sel?`sel-${t.toLowerCase()}`:''}"><div class="ac-title ${col}">${sel?'✓ ':''}${t}</div><div class="cl">${rows}</div></div>`;
  };
  return `
    <div class="mgrid">
      ${mc('Views',c.views?.toLocaleString(),bp>120?'g':bp<80?'r':'o',`${bp}% of baseline`,bp>120?'pos':bp<80?'neg':'neu')}
      ${mc('Unique Viewers',c.uniqueViewers?.toLocaleString(),'n',`${Math.round((c.uniqueViewers/c.views)*100)}% unique`,'')}
      ${mc('Non-Follower %',c.nonFollowerPct+'%',c.nonFollowerPct>60?'g':'o',c.nonFollowerPct>60?'algo pushing':'mostly followers',c.nonFollowerPct>60?'pos':'')}
      ${mc('Watch Time %',c.watchTimePct+'%',c.watchTimePct>35?'g':c.watchTimePct<20?'r':'o',c.watchTimeSec+'s avg',c.watchTimePct>35?'pos':c.watchTimePct<20?'neg':'neu')}
    </div>
    ${is7?`
    <div class="tgrid">
      <div class="tc"><div class="tc-cat">Distribution</div><div class="tc-val ${dc}">${c.distribution}</div><div class="tc-desc">${c.views?.toLocaleString()} vs ${bl?.toLocaleString()} baseline</div></div>
      <div class="tc"><div class="tc-cat">Engagement Quality</div><div class="tc-val ${c.engagementQuality==='Strong'?'g':c.engagementQuality==='Weak'?'r':'o'}">${c.engagementQuality}</div><div class="tc-desc">Save rate ${c.saveRate}% · ${c.shares} shares · ${c.comments} comments</div></div>
      <div class="tc"><div class="tc-cat">Business Signal</div><div class="tc-val ${c.businessSignal==='Strong'?'g':c.businessSignal==='Weak'?'r':'o'}">${c.businessSignal}</div><div class="tc-desc">${c.follows} follows · ${c.followsPer1k} per 1K</div></div>
      <div class="tc"><div class="tc-cat">Outcome</div><div class="tc-val ${c.outcome==='Winner'?'g':c.outcome==='Underperformed'?'r':'o'}">${c.outcome}</div><div class="tc-desc">Distribution + engagement criteria</div></div>
    </div>
    <div class="shd">Calculated Rates</div>
    <div class="rgrid">
      ${rc('Save Rate',c.saveRate+'%',c.saveRate>1?'g':c.saveRate>0.5?'o':'r',Math.min(c.saveRate*33,100))}
      ${rc('Share Rate',c.shareRate+'%',c.shareRate>1?'g':'o',Math.min(c.shareRate*25,100))}
      ${rc('Engagement Rate',c.engagementRate+'%',c.engagementRate>3?'g':c.engagementRate>1.5?'o':'r',Math.min(c.engagementRate*10,100))}
      ${rc('Follows / 1K',c.followsPer1k,c.followsPer1k>2?'g':'o',Math.min(c.followsPer1k*20,100))}
    </div>
    <div class="shd">Next Action</div>
    <div class="agrid">
      ${ac('Repeat','g',c.nextAction==='Repeat',[[c.views>bl*1.2,'Above baseline views'],[c.watchTimePct>35,'Watch time >35%'],[c.saves>10||c.saveRate>1,'Saves >10 or save rate >1%'],[c.follows>0,'Follows attributed'],[c.distribution?.includes('Above'),'Distribution = Expanded']])}
      ${ac('Iterate','o',c.nextAction==='Iterate',[[c.watchTimePct>35&&c.views<bl,'Good watch time + low views'],[c.views>bl&&c.watchTimePct<25,'High views + low watch time'],[c.saves>10&&!c.follows,'Good saves + no follows'],[c.distribution?.includes('Typical')||c.distribution?.includes('baseline'),'Distribution = Typical'],[false,'Strong topic, weak execution']])}
      ${ac('Drop','r',c.nextAction==='Drop',[[c.views<bl*0.8,'Below baseline views'],[c.watchTimePct<15,'Watch time <15%'],[c.saves===0&&c.shares===0,'Zero saves + zero shares'],[c.distribution?.includes('Limited')||c.distribution?.includes('Weak'),'Distribution = Limited'],[c.outcome==='Underperformed','Outcome = Underperformed']])}
    </div>`:''}
    <div class="shd">Notes</div>
    <div class="nb"><textarea placeholder="Hook effectiveness, topic angle, posting time, audio choice…">${c.notes||''}</textarea></div>`;
}

function renderUpcoming() {
  const allDue = [];
  POSTS.filter(p=>p.client===S.activeClient).forEach(p => {
    Object.entries(p.dueChecks||{}).forEach(([check,date]) => allDue.push({post:p,check,date,dateObj:new Date(date)}));
  });
  allDue.sort((a,b)=>a.dateObj-b.dateObj);
  const today = new Date(); today.setHours(0,0,0,0);
  const isToday = d => { const dd=new Date(d); dd.setHours(0,0,0,0); return dd<=today; };
  const row = item => `<div class="dr" onclick="selectPost(${item.post.id});setView('posts')">
    <div><div class="dr-title">${item.post.title}</div><div class="dr-meta">${item.post.platform==='ig'?'Instagram':'TikTok'} · Posted ${item.post.date}</div></div>
    <div class="dr-right"><div class="dw ${isToday(item.dateObj)?'today':'soon'}">${isToday(item.dateObj)?'Due now':item.date}</div><div class="dc">${item.check} check</div></div>
  </div>`;
  const todayItems = allDue.filter(d=>isToday(d.dateObj));
  const upcoming = allDue.filter(d=>!isToday(d.dateObj));
  document.getElementById('mainContent').innerHTML = `
    <div style="animation:fadeUp 0.25s ease both">
      <div class="uh">Upcoming <em>checks</em></div>
      <div class="usub">Posts waiting for their next data pull — run /track-post in Claude Code</div>
      ${todayItems.length?`<div style="margin-bottom:22px"><div class="dl">Due now</div>${todayItems.map(row).join('')}</div>`:''}
      ${upcoming.length?`<div><div class="dl">Coming up</div>${upcoming.map(row).join('')}</div>`:''}
      ${!todayItems.length&&!upcoming.length?`<div class="empty-state"><div class="ei">✅</div><div class="et">All caught up</div></div>`:''}
    </div>`;
}

}

function filterByTimeframe(posts) {
  if (S.timeframe === 'all') return posts;
  const now = new Date();
  const days = { '7d': 7, '30d': 30, '6m': 183, '1y': 365 }[S.timeframe] || 9999;
  const cutoff = new Date(now.getTime() - days * 24 * 60 * 60 * 1000);
  return posts.filter(p => {
    const d = new Date(p.date);
    return !isNaN(d.getTime()) && d >= cutoff;
  });
}

function renderInsights() {
  let posts = POSTS.filter(p => p.client === S.activeClient);
  posts = filterByTimeframe(posts);
  if (S.platFilter !== 'all') posts = posts.filter(p => p.platform === S.platFilter);
  if (S.postType !== 'all') posts = posts.filter(p => (p.type||'').toLowerCase() === S.postType.toLowerCase());

  const baseline = CLIENTS[S.activeClient].baselines[S.platFilter === 'tt' ? 'tt' : 'ig'];
  const posts7d = posts.filter(p => p.checks && p.checks['7d']);
  const winners = posts7d.filter(p => p.checks['7d'].outcome === 'Winner');
  const learnings = posts7d.filter(p => p.checks['7d'].outcome === 'Learning');
  const underperformed = posts7d.filter(p => p.checks['7d'].outcome === 'Underperformed');
  const testing = posts7d.filter(p => p.checks['7d'].outcome === 'Testing');

  // Apply outcome filter
  let filteredPosts7d = posts7d;
  if (S.outcomeFilter !== 'all') filteredPosts7d = posts7d.filter(p => (p.checks['7d'].outcome||'').toLowerCase() === S.outcomeFilter);

  const winRate = posts7d.length ? Math.round((winners.length / posts7d.length) * 100) : 0;
  const avgViews = posts7d.length ? Math.round(posts7d.reduce((s,p) => s + (p.checks['7d'].views||0), 0) / posts7d.length) : 0;
  const totalReach = posts.reduce((s,p) => s + (p.checks?.['7d']?.uniqueViewers||0), 0);
  const totalFollows = posts7d.reduce((s,p) => s + (p.checks['7d'].follows||0), 0);
  const totalSaves = posts7d.reduce((s,p) => s + (p.checks['7d'].saves||0), 0);

  // Best post
  const bestPost = [...posts7d].sort((a,b) => (b.checks['7d'].views||0) - (a.checks['7d'].views||0))[0];

  // Format breakdown
  const formats = ['Video','Carousel','Static'];
  const fmtData = formats.map(fmt => {
    const fp = posts7d.filter(p => (p.type||'Video') === fmt);
    const avgV = fp.length ? Math.round(fp.reduce((s,p)=>s+(p.checks['7d'].views||0),0)/fp.length) : 0;
    const avgSR = fp.length ? (fp.reduce((s,p)=>s+(p.checks['7d'].saveRate||0),0)/fp.length).toFixed(2) : 0;
    const avgNF = fp.length ? Math.round(fp.reduce((s,p)=>s+(p.checks['7d'].nonFollowerPct||0),0)/fp.length) : 0;
    const winR = fp.length ? Math.round(fp.filter(p=>p.checks['7d'].outcome==='Winner').length/fp.length*100) : 0;
    return { fmt, count: fp.length, avgV, avgSR, avgNF, winR };
  }).filter(f => f.count > 0);
  const maxFmtV = Math.max(...fmtData.map(f=>f.avgV), 1);

  // Evergreen posts
  const evergreen = posts.filter(p => {
    const c30 = p.checks?.['30d'];
    return c30 && (c30.distributionType === 'Evergreen' || c30['30dDistributionType'] === 'Evergreen');
  });

  // Top by views
  const topPosts = [...filteredPosts7d].sort((a,b)=>(b.checks['7d'].views||0)-(a.checks['7d'].views||0)).slice(0,5);
  // Best save rates
  const bestSave = [...filteredPosts7d].filter(p=>p.checks['7d'].saveRate).sort((a,b)=>b.checks['7d'].saveRate-a.checks['7d'].saveRate).slice(0,5);
  // Best non-follower reach
  const bestNF = [...filteredPosts7d].filter(p=>p.checks['7d'].nonFollowerPct).sort((a,b)=>b.checks['7d'].nonFollowerPct-a.checks['7d'].nonFollowerPct).slice(0,5);

  const maxV = topPosts.length ? topPosts[0].checks['7d'].views : 1;
  const maxSR = bestSave.length ? bestSave[0].checks['7d'].saveRate : 1;
  const maxNF = bestNF.length ? bestNF[0].checks['7d'].nonFollowerPct : 1;

  // Account health
  let healthColor = 'green', healthText = 'Healthy', healthSub = 'Win rate above 40% and avg views at or above baseline.';
  if (winRate < 20 || avgViews < baseline * 0.7) { healthColor='red'; healthText='Needs attention'; healthSub='Win rate below 20% or avg views significantly below baseline.'; }
  else if (winRate < 40 || avgViews < baseline) { healthColor='orange'; healthText='Building momentum'; healthSub='Some posts are hitting, others still finding their footing.'; }

  // Insights text
  const insights = [];
  if (winners.length > 0) insights.push(`<strong>${winners.length} winner${winners.length>1?'s':''}</strong> in this period. ${winners.slice(0,2).map(p=>`"${p.title}"`).join(' and ')} beat baseline with strong engagement.`);
  if (evergreen.length > 0) insights.push(`<strong>${evergreen.length} evergreen post${evergreen.length>1?'s':''}</strong> — still getting views after 30 days. These topics have lasting relevance.`);
  if (fmtData.length > 1) {
    const best = [...fmtData].sort((a,b)=>b.avgV-a.avgV)[0];
    insights.push(`<strong>${best.fmt} is your best-performing format</strong> with an avg of ${best.avgV.toLocaleString()} views. Win rate: ${best.winR}%.`);
  }
  const highSave = posts7d.filter(p=>(p.checks['7d'].saveRate||0)>1);
  if (highSave.length > 0) insights.push(`<strong>${highSave.length} post${highSave.length>1?'s':''}</strong> had a save rate above 1% — content people found worth keeping. Repeat these hooks.`);
  if (totalFollows > 0) insights.push(`Content drove <strong>${totalFollows} follows</strong> this period. That's real audience growth attributed directly to your posts.`);

  const tfLabel = {'7d':'Last 7 days','30d':'Last 30 days','6m':'Last 6 months','1y':'Last year','all':'All time'}[S.timeframe];

  document.getElementById('mainContent').innerHTML = `
    <div style="animation:fadeUp 0.25s ease both">
      <div style="margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-end;">
        <div>
          <div style="font-family:'Fraunces',serif;font-size:24px;font-weight:300;margin-bottom:4px;">Account <em style="font-style:italic;color:var(--orange);">insights</em></div>
          <div style="font-size:10px;color:var(--muted);">${S.activeClient} · ${tfLabel} · ${posts7d.length} posts with 7d data</div>
        </div>
      </div>

      <!-- FILTER BAR -->
      <div class="filter-bar">
        <div class="filter-group">
          <span class="filter-group-label">Time</span>
          ${['7d','30d','6m','1y','all'].map(t=>`<button class="tf-btn ${S.timeframe===t?'active':''}" onclick="setTimeframe('${t}')">${t==='all'?'All':t==='6m'?'6mo':t==='1y'?'1yr':t}</button>`).join('')}
        </div>
        <div class="filter-sep"></div>
        <div class="filter-group">
          <span class="filter-group-label">Platform</span>
          <button class="pf-btn ${S.platFilter==='all'?'active all':''}" onclick="filterPlatInsights('all',this)">All</button>
          <button class="pf-btn ${S.platFilter==='ig'?'active ig':''}" onclick="filterPlatInsights('ig',this)">IG</button>
          <button class="pf-btn ${S.platFilter==='tt'?'active tt':''}" onclick="filterPlatInsights('tt',this)">TT</button>
        </div>
        <div class="filter-sep"></div>
        <div class="filter-group">
          <span class="filter-group-label">Format</span>
          ${['all','Video','Carousel','Static'].map(t=>`<button class="tf-btn ${S.postType===t?'active':''}" onclick="setPostType('${t}')">${t==='all'?'All':t}</button>`).join('')}
        </div>
        <div class="filter-sep"></div>
        <div class="filter-group">
          <span class="filter-group-label">Outcome</span>
          ${['all','winner','learning','underperformed','testing'].map(t=>`<button class="tf-btn ${S.outcomeFilter===t?'active':''}" onclick="setOutcomeFilter('${t}')">${t==='all'?'All':t.charAt(0).toUpperCase()+t.slice(1)}</button>`).join('')}
        </div>
      </div>

      <!-- ACCOUNT HEALTH -->
      <div class="ins-health">
        <div class="ins-health-dot ${healthColor}"></div>
        <div>
          <div class="ins-health-text">${healthText}</div>
          <div class="ins-health-sub">${healthSub}</div>
        </div>
      </div>

      <!-- BEST POST OF PERIOD -->
      ${bestPost ? `
      <div class="ins-best-post">
        <div>
          <div class="ins-best-label">⭐ Best post this period</div>
          <div class="ins-best-title">"${bestPost.title}"</div>
          <div class="ins-best-meta">${bestPost.platform==='ig'?'Instagram':'TikTok'} · Posted ${bestPost.date} · ${bestPost.checks['7d'].outcome||''}</div>
        </div>
        <div class="ins-best-stats">
          <div class="ins-best-stat">
            <div class="ins-best-stat-val">${(bestPost.checks['7d'].views||0).toLocaleString()}</div>
            <div class="ins-best-stat-label">Views</div>
          </div>
          <div class="ins-best-stat">
            <div class="ins-best-stat-val">${(bestPost.checks['7d'].saveRate||0).toFixed(1)}%</div>
            <div class="ins-best-stat-label">Save Rate</div>
          </div>
          <div class="ins-best-stat">
            <div class="ins-best-stat-val">${bestPost.checks['7d'].follows||0}</div>
            <div class="ins-best-stat-label">Follows</div>
          </div>
        </div>
      </div>` : ''}

      <!-- SUMMARY CARDS -->
      <div class="ins-grid">
        <div class="ins-card">
          <div class="ins-card-label">Win Rate</div>
          <div class="ins-card-val ${winRate>=50?'green':winRate>=30?'orange':'red'}">${winRate}%</div>
          <div class="ins-card-sub">${winners.length} of ${posts7d.length} posts beat baseline</div>
        </div>
        <div class="ins-card">
          <div class="ins-card-label">Avg 7d Views</div>
          <div class="ins-card-val ${avgViews>=baseline?'green':avgViews>=baseline*0.8?'orange':'red'}">${avgViews.toLocaleString()}</div>
          <div class="ins-card-sub">Baseline: ${baseline.toLocaleString()}</div>
        </div>
        <div class="ins-card">
          <div class="ins-card-label">Total Saves</div>
          <div class="ins-card-val orange">${totalSaves.toLocaleString()}</div>
          <div class="ins-card-sub">Content people bookmarked</div>
        </div>
        <div class="ins-card">
          <div class="ins-card-label">Follows from Content</div>
          <div class="ins-card-val green">${totalFollows}</div>
          <div class="ins-card-sub">Attributed to tracked posts</div>
        </div>
      </div>

      <!-- FORMAT BREAKDOWN -->
      ${fmtData.length > 0 ? `
      <div class="ins-section">
        <div class="ins-section-title">Performance by format</div>
        <div class="ins-format-grid">
          ${fmtData.map(f=>`
            <div class="ins-format-card">
              <div class="ins-format-name">${f.fmt} · ${f.count} post${f.count!==1?'s':''}</div>
              <div class="ins-format-val">${f.avgV.toLocaleString()}</div>
              <div class="ins-format-sub">avg 7d views · Win rate ${f.winR}%</div>
              <div class="ins-format-bar"><div class="ins-format-bar-fill" style="width:${Math.round(f.avgV/maxFmtV*100)}%"></div></div>
              <div style="margin-top:10px;font-size:10px;color:var(--muted);">Save rate avg: ${f.avgSR}% · Non-follower reach avg: ${f.avgNF}%</div>
            </div>
          `).join('')}
        </div>
      </div>` : ''}

      <!-- TWO COL: Outcome + Insights -->
      <div class="ins-two-col">
        <div class="ins-panel">
          <div class="ins-panel-title">Outcome breakdown</div>
          ${[['Winner',winners.length,'#2a8a3e'],['Learning',learnings.length,'#c8a000'],['Testing',testing.length,'#b0a898'],['Underperformed',underperformed.length,'#cc3333']].map(([label,count,color])=>`
            <div class="ins-donut-row">
              <div class="ins-donut-swatch" style="background:${color}"></div>
              <div class="ins-donut-name">${label}</div>
              <div class="ins-donut-pct">${count} post${count!==1?'s':''} ${posts7d.length?'('+Math.round(count/posts7d.length*100)+'%)':''}</div>
            </div>
            <div style="height:4px;background:var(--border2);margin-bottom:10px;border-radius:2px;overflow:hidden;"><div style="width:${posts7d.length?Math.round(count/posts7d.length*100):0}%;height:100%;background:${color};border-radius:2px;"></div></div>
          `).join('')}
        </div>
        <div class="ins-panel">
          <div class="ins-panel-title">Key takeaways</div>
          ${insights.map(i=>`<div class="ins-insight-row">${i}</div>`).join('')}
          ${insights.length===0?'<div class="ins-insight-row">Add more 7d data to unlock insights.</div>':''}
        </div>
      </div>

      <!-- TOP BY VIEWS -->
      ${topPosts.length ? `
      <div class="ins-section">
        <div class="ins-section-title">Top posts by 7d views</div>
        ${topPosts.map(p=>{
          const v=p.checks['7d'].views||0;
          const color=p.checks['7d'].outcome==='Winner'?'green':p.checks['7d'].outcome==='Underperformed'?'red':'orange';
          return `<div class="ins-bar-row">
            <div class="ins-bar-label" title="${p.title}">${p.title}</div>
            <div class="ins-bar-track"><div class="ins-bar-fill ${color}" style="width:${Math.round(v/maxV*100)}%"></div></div>
            <div class="ins-bar-num">${v.toLocaleString()}</div>
          </div>`;
        }).join('')}
      </div>` : ''}

      <!-- BEST SAVE RATES -->
      ${bestSave.length ? `
      <div class="ins-section">
        <div class="ins-section-title">Most saved content (bookmarkable)</div>
        ${bestSave.map(p=>{
          const r=p.checks['7d'].saveRate||0;
          return `<div class="ins-bar-row">
            <div class="ins-bar-label" title="${p.title}">${p.title}</div>
            <div class="ins-bar-track"><div class="ins-bar-fill green" style="width:${Math.round(r/maxSR*100)}%"></div></div>
            <div class="ins-bar-num">${r.toFixed(2)}%</div>
          </div>`;
        }).join('')}
        <div style="font-size:10px;color:var(--muted);margin-top:8px;">Save rate above 1% = content people found worth keeping. Repeat these hooks and formats.</div>
      </div>` : ''}

      <!-- BEST NON-FOLLOWER REACH -->
      ${bestNF.length ? `
      <div class="ins-section">
        <div class="ins-section-title">Best new audience reach (non-followers)</div>
        ${bestNF.map(p=>{
          const r=p.checks['7d'].nonFollowerPct||0;
          return `<div class="ins-bar-row">
            <div class="ins-bar-label" title="${p.title}">${p.title}</div>
            <div class="ins-bar-track"><div class="ins-bar-fill orange" style="width:${Math.round(r/maxNF*100)}%"></div></div>
            <div class="ins-bar-num">${r}%</div>
          </div>`;
        }).join('')}
        <div style="font-size:10px;color:var(--muted);margin-top:8px;">These posts found new audiences. The hook or topic had broad enough appeal to travel beyond your existing followers.</div>
      </div>` : ''}

      <!-- EVERGREEN CONTENT -->
      ${evergreen.length ? `
      <div class="ins-section">
        <div class="ins-section-title">Evergreen content — still earning views at 30d</div>
        ${evergreen.map(p=>`
          <div class="ins-evergreen-row">
            <div class="ins-evergreen-title">${p.title}</div>
            <div class="ins-evergreen-views">${(p.checks['30d']?.views||0).toLocaleString()} total views</div>
          </div>
        `).join('')}
        <div style="font-size:10px;color:var(--muted);margin-top:8px;">Evergreen posts keep working without new effort. These topics are worth revisiting and updating.</div>
      </div>` : ''}

      <!-- REPEAT HIGHLIGHTS -->
      <div class="ins-section">
        <div class="ins-section-title">Posts to repeat</div>
        ${winners.length ? winners.map(p=>`
          <div class="ins-highlight">
            <div class="ins-highlight-title">✓ ${p.title}</div>
            <div class="ins-highlight-body">${(p.checks['7d'].views||0).toLocaleString()} views · Save rate ${(p.checks['7d'].saveRate||0).toFixed(2)}% · ${p.checks['7d'].follows||0} follows · ${p.platform==='ig'?'Instagram':'TikTok'}</div>
          </div>
        `).join('') : '<div style="font-size:11px;color:var(--muted);">No winners yet in this filter — try expanding the timeframe.</div>'}
      </div>

    </div>`;
}

function setPostType(t) { S.postType = t; renderInsights(); }
function setOutcomeFilter(t) { S.outcomeFilter = t; renderInsights(); }

function filterPlatInsights(plat, btn) {
  S.platFilter = plat;
  document.querySelectorAll('.pf-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderInsights();
}

function filterPlat(plat, btn) {
  S.platFilter = plat;
  document.querySelectorAll('.pf-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderPostList();
}

if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', init); } else { init(); }
</script>
</body>
</html>
